name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'slidev/**'
      - 'materials/**'
      - '.github/workflows/slidev.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slidev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: slidev/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build Slidev presentation
        run: npx slidev build PRESENTATION_SLIDEV.md --base /${{ github.event.repository.name }}/

      - name: Copy materials into dist
        run: |
          mkdir -p dist/materials
          cp -r ../materials/* dist/materials/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: slidev/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
